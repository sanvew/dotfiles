- defaults:
    link:
      create: true
      relink: true
      backup: true
- link:
    ~/.local/bin/reload-dotfiles: './reload-dotfiles'
- link:
    ~/.local/bin:
      glob: true
      path: './syncthing/**'
      exclude: [ '**/docker-compose.yaml' ]
    ~/.config/syncthing/docker-compose.yaml: './syncthing/docker-compose.yaml'

