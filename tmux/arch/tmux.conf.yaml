- defaults:
    link:
      create: true
      relink: true
      backup: true
- link:
    ~/.config/tmux:
      glob: true
      path: './**'
      exclude: [ '**/tmux.conf.yaml' ]
- shell:
    - >
      [ ! -d '~/.config/tmux/plugins/tpm' ]
      && git clone https://github.com/tmux-plugins/tpm ~/.config/tmux/plugins/tpm
      || :
    - ~/.config/tmux/plugins/tpm/bin/install_plugins

